---
- name: Listen for Red Hat Insights Webhook Events
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Trigger Remediation Playbook
      condition: event.payload.display_name is defined
      action:
        run_job_template:
          name: "Vulnerability Remediation"
          organization: "Default"
          job_args:
            extra_vars:
              insights_adv_target_host: "{{ event.payload.display_name }}"
              insights_cve_id: "{{ event.payload.cve_id | default('') }}"
