---
insights_api_url: "https://console.redhat.com/api"
sso_endpoint: "https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token"
aap_project_name: "RedHat Insights"
aap_inventory_name: "Insights Inventory"
aap_credential_name: "Machine Creds"

# AAP Controller connection settings (looks for Ansible variables awx_host/tower_host injected by AAP, falling back to environment)
controller_host: "{{ awx_host | default(tower_host) | default(lookup('env', 'CONTROLLER_HOST')) | default(lookup('env', 'TOWER_HOST')) | default('') }}"
controller_username: "{{ awx_username | default(tower_username) | default(lookup('env', 'CONTROLLER_USERNAME')) | default(lookup('env', 'TOWER_USERNAME')) | default('') }}"
controller_password: "{{ awx_password | default(tower_password) | default(lookup('env', 'CONTROLLER_PASSWORD')) | default(lookup('env', 'TOWER_PASSWORD')) | default('') }}"
controller_oath_token: "{{ awx_oauth_token | default(tower_oauth_token) | default(lookup('env', 'CONTROLLER_OAUTH_TOKEN')) | default(lookup('env', 'TOWER_OAUTH_TOKEN')) | default('') }}"
